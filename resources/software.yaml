- title: "`pastclim`"
  description: "An R library  designed to provide an easy way to extract and manipulate palaeoclimate reconstructions for ecological and anthropological analyses. It is also able to handle time series of current and future reconstructions."
  path: "https://evolecolgroup.github.io/pastclim/"
  categories: [R, SDM, climate, palaeoclimate]
  image: "img/pastclim_logo.png"
  date: 1/1/2023

- title: "`tidysdm`"
  description: "`tidysdm` implements Species Distribution Models using the
`tidymodels` framework. The advantage of `tidymodels` is that the model syntax and the results
returned to the user are standardised, thus providing a coherent interface to
modelling."
  path: "https://evolecolgroup.github.io/tidysdm/"
  categories: [R, SDM]
  image: "img/tidysdm_logo.png"
  date: 1/1/2024

- title: "`crstools`"
  description: "Tools to work with map projections in R. Choose the right projection for the job, and visualise the resulting distortion. Georeference data from unknown projections."
  path: "https://evolecolgroup.github.io/crstools/"
  categories: [R, SDM, maps]
  image: "img/crstools_logo.png"
  date: 1/2/2026

- title: "`tidypopgen`"
