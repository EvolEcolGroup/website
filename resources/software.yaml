  image: "img/tidypopgen_logo.png"
  date: 1/1/2025

- title: "`tidygenclust`"
  description: "`tidygenslucst` provides functions and methods to run genetic clustering in R."
  path: "https://evolecolgroup.github.io/tidygenclust"
